- name: DBGMCU
  address: 0x40015800
  registers:
    kind: dbgmcu
    version: f072
    block: DBGMCU_F071
  rcc:
    bus_clock: PCLK1
    kernel_clock: PCLK1
    enable:
      register: APBENR2
      field: DBGEN
    reset:
      register: APBRSTR2
      field: DBGRST

- name: RCC
  address: 0x40021000
  registers:
    kind: rcc
    version: f072
    block: RCC_F071
  pins:
  - pin: PA1
    signal: MCO
    af: 0
  interrupts:
  - signal: GLOBAL
    interrupt: RCC_CTC
